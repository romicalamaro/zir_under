<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>טבלת פלטות — תצוגת צבעים</title>
    <style>
      :root {
        --bg: #f6f4ee;
        --text: #1a1a1a;
        --border: #ccc9be;
        --header: #ebe6d8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 1.25rem 1.5rem 2rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.4;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0;
        flex: 1 1 auto;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }
      button {
        font: inherit;
        cursor: pointer;
        padding: 0.4rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: #fff;
      }
      button:hover {
        background: #fffef8;
      }
      #status {
        font-size: 0.9rem;
        color: #555;
        margin-bottom: 0.75rem;
      }
      #status.is-error {
        color: #b00020;
      }
      .table-wrap {
        overflow: auto;
        max-width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
      }
      table {
        border-collapse: collapse;
        width: max-content;
        min-width: 100%;
        font-size: 0.82rem;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 0.35rem 0.5rem;
        vertical-align: middle;
        max-width: 14rem;
      }
      th {
        background: var(--header);
        position: sticky;
        top: 0;
        z-index: 1;
        font-weight: 600;
        white-space: nowrap;
      }
      tr.section-row td {
        background: #e8e4d6;
        font-weight: 600;
      }
      tr.division-row td {
        background: #f0ede4;
        font-weight: 600;
        font-size: 0.8rem;
      }
      td.division {
        text-align: center;
        font-family: ui-monospace, monospace;
        white-space: nowrap;
      }
      td.slot {
        font-family: ui-monospace, monospace;
        font-weight: 600;
        white-space: nowrap;
      }
      td.color-cell {
        font-family: ui-monospace, monospace;
        text-align: center;
        min-width: 5.5rem;
        white-space: nowrap;
      }
      td.color-cell.is-empty {
        background: repeating-linear-gradient(
          45deg,
          #f0f0f0,
          #f0f0f0 6px,
          #fafafa 6px,
          #fafafa 12px
        );
        color: #888;
      }
      td.color-cell.is-invalid {
        background: #ffe8e8;
        color: #900;
      }
      a.back {
        font-size: 0.9rem;
        color: #3c06a7;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>טבלת פלטות — תצוגת צבעים</h1>
      <div class="toolbar">
        <button type="button" id="reload-btn">רענון</button>
        <a class="back" href="index.html">← חזרה לאפליקציה</a>
      </div>
    </header>
    <p id="status">טוען…</p>
    <div class="table-wrap">
      <table id="palette-table" aria-label="טבלת צבעי פלטות">
        <thead id="palette-thead">
          <tr>
            <th>קטגוריה</th>
            <th>חלוקה</th>
            <th>Slot</th>
            <th>אלמנט</th>
            <th>Palette 1</th>
          </tr>
        </thead>
        <tbody id="palette-tbody"></tbody>
      </table>
    </div>

    <script src="js/embeddedPaletteCsv.js"></script>
    <script>
      (function () {
        "use strict";

        var SHEET_DOC_ID = "1yMwNB7MopTJWDEH328VF0WiU2XXdPu5Cfs0I1YDyeDQ";
        var SHEET_GID = "790839210";
        var SHEET_CSV_URL =
          "https://docs.google.com/spreadsheets/d/" +
          SHEET_DOC_ID +
          "/export?format=csv&gid=" +
          SHEET_GID;
        var LOCAL_CSV_URL = "data/sheet-palette-colors.csv";
        var SHEET_CSV_PROXY_URL =
          "http://127.0.0.1:8080/api/google-sheet-palette.csv";
        var GVIZ_SCRIPT_ATTR = "data-palette-preview-gviz";
        var gvizLoadGeneration = 0;
        /** gviz returns Palette 8–12 as numbers — hex with letters is null; need CSV export. */
        var CSV_ONLY_PALETTE_LABELS = [
          "Palette 8",
          "Palette 9",
          "Palette 10",
          "Palette 11",
          "Palette 12",
        ];

        var statusEl = document.getElementById("status");
        var thead = document.getElementById("palette-thead");
        var tbody = document.getElementById("palette-tbody");
        var reloadBtn = document.getElementById("reload-btn");
        var colorColumnLabels = ["Palette 1"];

        function normalizeHex(value) {
          if (value == null || value === "") return null;
          var v = String(value).trim();
          if (!v) return null;
          /** gviz returns numeric hex cells as floats, e.g. 685450.0 */
          if (/^\d+(\.0+)?$/.test(v)) {
            v = v.split(".")[0];
          }
          if (v.charAt(0) !== "#") v = "#" + v;
          v = v.toLowerCase();
          if (/^#[0-9a-f]{3}$/.test(v)) {
            return (
              "#" +
              v.charAt(1) +
              v.charAt(1) +
              v.charAt(2) +
              v.charAt(2) +
              v.charAt(3) +
              v.charAt(3)
            );
          }
          if (/^#[0-9a-f]{6}$/.test(v)) return v;
          return null;
        }

        function contrastText(hex) {
          var h = hex.replace("#", "");
          var r = parseInt(h.substr(0, 2), 16);
          var g = parseInt(h.substr(2, 2), 16);
          var b = parseInt(h.substr(4, 2), 16);
          var yiq = (r * 299 + g * 587 + b * 114) / 1000;
          return yiq >= 140 ? "#111111" : "#ffffff";
        }

        function parseCsvLine(line) {
          var fields = [];
          var current = "";
          var inQuotes = false;
          var i;
          for (i = 0; i < line.length; i++) {
            var ch = line.charAt(i);
            if (inQuotes) {
              if (ch === '"') {
                if (line.charAt(i + 1) === '"') {
                  current += '"';
                  i++;
                } else {
                  inQuotes = false;
                }
              } else {
                current += ch;
              }
            } else if (ch === '"') {
              inQuotes = true;
            } else if (ch === ",") {
              fields.push(current);
              current = "";
            } else {
              current += ch;
            }
          }
          fields.push(current);
          return fields;
        }

        function getCsvLayout(headerLine) {
          var header = (headerLine || "").replace(/^\uFEFF/, "");
          var headerCols = parseCsvLine(header);
          var colorsStart = 4;
          var colorLabels = [];
          var ci;
          if (header.indexOf(",Division,") !== -1 || header.indexOf(",Division,Slot,") !== -1) {
            for (ci = colorsStart; ci < headerCols.length; ci++) {
              var label = (headerCols[ci] || "").trim();
              if (label) colorLabels.push(label);
            }
            return {
              hasDivision: true,
              division: 1,
              slot: 2,
              element: 3,
              colorsStart: colorsStart,
              colorLabels: colorLabels,
            };
          }
          colorsStart = 3;
          colorLabels = [];
          for (ci = colorsStart; ci < headerCols.length; ci++) {
            label = (headerCols[ci] || "").trim();
            if (label) colorLabels.push(label);
          }
          return {
            hasDivision: false,
            division: -1,
            slot: 1,
            element: 2,
            colorsStart: colorsStart,
            colorLabels: colorLabels,
          };
        }

        function parseCsvRecords(text) {
          var records = [];
          var fields = [];
          var current = "";
          var inQuotes = false;
          var body = (text || "").replace(/^\uFEFF/, "");
          var i;
          var ch;
          for (i = 0; i < body.length; i++) {
            ch = body.charAt(i);
            if (inQuotes) {
              if (ch === '"') {
                if (body.charAt(i + 1) === '"') {
                  current += '"';
                  i++;
                } else {
                  inQuotes = false;
                }
              } else if (ch === "\r") {
                if (body.charAt(i + 1) === "\n") i++;
                current += "\n";
              } else if (ch === "\n") {
                current += "\n";
              } else {
                current += ch;
              }
            } else if (ch === '"') {
              inQuotes = true;
            } else if (ch === ",") {
              fields.push(current);
              current = "";
            } else if (ch === "\r") {
              if (body.charAt(i + 1) === "\n") i++;
              fields.push(current);
              current = "";
              records.push(fields);
              fields = [];
            } else if (ch === "\n") {
              fields.push(current);
              current = "";
              records.push(fields);
              fields = [];
            } else {
              current += ch;
            }
          }
          if (current.length || fields.length) {
            fields.push(current);
            records.push(fields);
          }
          return records;
        }

        function parseRows(text) {
          var records = parseCsvRecords(text);
          if (!records.length) return [];
          var layout = getCsvLayout(records[0].join(","));
          colorColumnLabels = layout.colorLabels.length
            ? layout.colorLabels
            : ["Palette 1"];
          var rows = [];
          var li;
          for (li = 1; li < records.length; li++) {
            var cols = records[li];
            if (!cols || !cols.length) continue;
            var colors = [];
            var pi;
            for (pi = 0; pi < colorColumnLabels.length; pi++) {
              colors.push((cols[layout.colorsStart + pi] || "").trim());
            }
            rows.push({
              category: (cols[0] || "").trim(),
              division: layout.hasDivision ? (cols[1] || "").trim() : "",
              slot: (cols[layout.slot] || "").trim(),
              element: (cols[layout.element] || "").trim(),
              colors: colors,
            });
          }
          return rows;
        }

        function renderTableHeader() {
          var tr = document.createElement("tr");
          var headers = ["קטגוריה", "חלוקה", "Slot", "אלמנט"].concat(colorColumnLabels);
          var hi;
          for (hi = 0; hi < headers.length; hi++) {
            var th = document.createElement("th");
            th.textContent = headers[hi];
            tr.appendChild(th);
          }
          thead.textContent = "";
          thead.appendChild(tr);
        }

        function makeColorCell(raw) {
          var td = document.createElement("td");
          td.className = "color-cell";
          if (!raw) {
            td.classList.add("is-empty");
            td.textContent = "—";
            td.title = "ריק";
            return td;
          }
          var hex = normalizeHex(raw);
          if (!hex) {
            td.classList.add("is-invalid");
            td.textContent = raw;
            td.title = "ערך לא תקין";
            return td;
          }
          td.textContent = hex;
          td.style.backgroundColor = hex;
          td.style.color = contrastText(hex);
          td.title = hex;
          return td;
        }

        function renderTable(rows) {
          renderTableHeader();
          tbody.textContent = "";
          var colSpan = 4 + colorColumnLabels.length;
          var ri;
          for (ri = 0; ri < rows.length; ri++) {
            var row = rows[ri];
            var tr = document.createElement("tr");
            if (!row.slot) {
              if (row.division || (row.element && row.element.indexOf("◆") === 0)) {
                tr.className = "division-row";
                var tdDiv = document.createElement("td");
                tdDiv.colSpan = colSpan;
                var divLabel = row.category ? row.category + " · " : "";
                if (row.division) divLabel += "חלוקה " + row.division;
                if (row.element) {
                  divLabel += (divLabel ? " — " : "") + row.element;
                }
                tdDiv.textContent = divLabel || row.category;
                tr.appendChild(tdDiv);
              } else {
                tr.className = "section-row";
                var tdSection = document.createElement("td");
                tdSection.colSpan = colSpan;
                tdSection.textContent = row.category || "(קטגוריה)";
                tr.appendChild(tdSection);
              }
              tbody.appendChild(tr);
              continue;
            }
            var tdCat = document.createElement("td");
            tdCat.textContent = row.category;
            var tdDivision = document.createElement("td");
            tdDivision.className = "division";
            tdDivision.textContent = row.division || "—";
            var tdSlot = document.createElement("td");
            tdSlot.className = "slot";
            tdSlot.textContent = row.slot;
            var tdEl = document.createElement("td");
            tdEl.textContent = row.element;
            tr.appendChild(tdCat);
            tr.appendChild(tdDivision);
            tr.appendChild(tdSlot);
            tr.appendChild(tdEl);
            var ci;
            for (ci = 0; ci < row.colors.length; ci++) {
              tr.appendChild(makeColorCell(row.colors[ci]));
            }
            tbody.appendChild(tr);
          }
        }

        function setStatus(msg, isError) {
          statusEl.textContent = msg;
          statusEl.classList.toggle("is-error", !!isError);
        }

        function fetchText(url) {
          var bust =
            (url.indexOf("?") >= 0 ? "&" : "?") + "_=" + Date.now();
          return fetch(url + bust, {
            cache: "no-store",
            headers: {
              "Cache-Control": "no-cache, no-store, must-revalidate",
              Pragma: "no-cache",
            },
          }).then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.text();
          });
        }

        function gvizCellValue(cell) {
          if (!cell) return "";
          if (cell.f != null && String(cell.f).trim() !== "") {
            return String(cell.f);
          }
          if (cell.v == null || cell.v === "") return "";
          if (typeof cell.v === "number") {
            if (Number.isInteger(cell.v)) return String(cell.v);
            if (cell.v === Math.floor(cell.v)) return String(Math.trunc(cell.v));
          }
          return String(cell.v);
        }

        function escapeCsvField(value) {
          if (!value) return "";
          if (
            value.indexOf(",") >= 0 ||
            value.indexOf('"') >= 0 ||
            value.indexOf("\n") >= 0
          ) {
            return '"' + value.replace(/"/g, '""') + '"';
          }
          return value;
        }

        function gvizResponseToCsv(response) {
          if (
            !response ||
            response.status !== "ok" ||
            !response.table ||
            !response.table.rows
          ) {
            throw new Error("Invalid Google Sheet gviz response");
          }
          var tableCols = response.table.cols || [];
          var colCount = tableCols.length || 5;
          var headerParts = [];
          var hi;
          for (hi = 0; hi < colCount; hi++) {
            var label = tableCols[hi] && tableCols[hi].label;
            headerParts.push(escapeCsvField(label != null ? String(label) : ""));
          }
          var lines = [headerParts.join(",")];
          var rows = response.table.rows;
          var ri;
          for (ri = 0; ri < rows.length; ri++) {
            var cells = rows[ri].c || [];
            var cols = [];
            var ci;
            for (ci = 0; ci < colCount; ci++) {
              cols.push(escapeCsvField(gvizCellValue(cells[ci])));
            }
            lines.push(cols.join(","));
          }
          return lines.join("\n");
        }

        function getGoogleSheetGvizUrl(generation) {
          return (
            "https://docs.google.com/spreadsheets/d/" +
            SHEET_DOC_ID +
            "/gviz/tq?tqx=out:json&headers=1&gid=" +
            SHEET_GID +
            "&_=" +
            Date.now() +
            "." +
            generation
          );
        }

        function removeStaleGvizScripts() {
          var stale = document.querySelectorAll("script[" + GVIZ_SCRIPT_ATTR + "]");
          var i;
          for (i = 0; i < stale.length; i++) {
            if (stale[i].parentNode) stale[i].parentNode.removeChild(stale[i]);
          }
        }

        /** JSONP via gviz — works on file:// where fetch() to Google/local CSV is blocked. */
        function fetchGoogleSheetViaGviz() {
          gvizLoadGeneration += 1;
          var generation = gvizLoadGeneration;
          return new Promise(function (resolve, reject) {
            var timeoutMs = 20000;
            var timeoutId = setTimeout(function () {
              restoreGvizHandler();
              reject(new Error("Google Sheet gviz timeout"));
            }, timeoutMs);

            var previousSetResponse = null;
            if (
              window.google &&
              window.google.visualization &&
              window.google.visualization.Query
            ) {
              previousSetResponse = window.google.visualization.Query.setResponse;
            } else {
              if (!window.google) window.google = {};
              if (!window.google.visualization) window.google.visualization = {};
              if (!window.google.visualization.Query) {
                window.google.visualization.Query = {};
              }
            }

            function restoreGvizHandler() {
              clearTimeout(timeoutId);
              if (
                window.google &&
                window.google.visualization &&
                window.google.visualization.Query &&
                previousSetResponse
              ) {
                window.google.visualization.Query.setResponse = previousSetResponse;
              }
            }

            window.google.visualization.Query.setResponse = function (response) {
              if (generation !== gvizLoadGeneration) return;
              restoreGvizHandler();
              if (previousSetResponse) {
                try {
                  previousSetResponse.call(window.google.visualization.Query, response);
                } catch (ignore) {
                  /* ignore chained handler errors */
                }
              }
              try {
                var csvText = gvizResponseToCsv(response);
                resolve(csvText);
              } catch (e) {
                reject(e);
              }
            };

            removeStaleGvizScripts();
            var script = document.createElement("script");
            script.setAttribute(GVIZ_SCRIPT_ATTR, "1");
            script.onerror = function () {
              if (generation !== gvizLoadGeneration) return;
              restoreGvizHandler();
              reject(new Error("Google Sheet gviz script failed"));
            };
            script.src = getGoogleSheetGvizUrl(generation);
            (document.head || document.documentElement).appendChild(script);
          });
        }

        /** JSONP proxy — works on file:// where fetch() to localhost is blocked. */
        function fetchCsvViaJsonpProxy() {
          return new Promise(function (resolve, reject) {
            var cb =
              "palettePreviewCsv_" +
              Date.now() +
              "_" +
              Math.floor(Math.random() * 1e6);
            var timeoutId = setTimeout(function () {
              cleanup();
              reject(new Error("proxy JSONP timeout"));
            }, 15000);
            var script = document.createElement("script");
            function cleanup() {
              clearTimeout(timeoutId);
              try {
                delete window[cb];
              } catch (ignore) {
                window[cb] = undefined;
              }
              if (script.parentNode) script.parentNode.removeChild(script);
            }
            window[cb] = function (text) {
              cleanup();
              if (typeof text !== "string" || !isValidPaletteCsvHeader(text)) {
                reject(new Error("Invalid proxy JSONP CSV"));
                return;
              }
              resolve(text);
            };
            script.onerror = function () {
              cleanup();
              reject(new Error("proxy JSONP failed"));
            };
            script.src =
              SHEET_CSV_PROXY_URL +
              (SHEET_CSV_PROXY_URL.indexOf("?") >= 0 ? "&" : "?") +
              "callback=" +
              encodeURIComponent(cb) +
              "&_=" +
              Date.now();
            (document.head || document.documentElement).appendChild(script);
          });
        }

        function fetchLiveSheetCsvText() {
          return fetchText(SHEET_CSV_URL)
            .then(function (text) {
              return { text: text, source: "csv" };
            })
            .catch(function () {
              return fetchText(
                SHEET_CSV_PROXY_URL +
                  (SHEET_CSV_PROXY_URL.indexOf("?") >= 0 ? "&" : "?") +
                  "_=" +
                  Date.now()
              ).then(function (text) {
                return { text: text, source: "proxy" };
              });
            })
            .catch(function () {
              return fetchCsvViaJsonpProxy().then(function (text) {
                return { text: text, source: "proxy-jsonp" };
              });
            })
            .catch(function () {
              return fetchGoogleSheetViaGviz().then(function (text) {
                return { text: text, source: "gviz" };
              });
            });
        }

        function isEmptyPaletteCell(value) {
          if (value == null) return true;
          var v = String(value).trim();
          return !v || !normalizeHex(v);
        }

        function countCsvOnlyPaletteGaps(text) {
          if (!text) return 0;
          var records = parseCsvRecords(text);
          if (records.length < 2) return 0;
          var layout = getCsvLayout(records[0].join(","));
          var headerCols = parseCsvLine(records[0].join(","));
          var colIndices = [];
          var li;
          for (li = 0; li < CSV_ONLY_PALETTE_LABELS.length; li++) {
            var hi;
            for (hi = 0; hi < headerCols.length; hi++) {
              if ((headerCols[hi] || "").trim() === CSV_ONLY_PALETTE_LABELS[li]) {
                colIndices.push(hi);
                break;
              }
            }
          }
          if (!colIndices.length) return 0;
          var gaps = 0;
          var ri;
          for (ri = 1; ri < records.length; ri++) {
            var cols = records[ri];
            if (!(cols[layout.slot] || "").trim()) continue;
            var ci;
            for (ci = 0; ci < colIndices.length; ci++) {
              if (isEmptyPaletteCell(cols[colIndices[ci]])) gaps++;
            }
          }
          return gaps;
        }

        /** Fill empty Palette 8–12 cells from authority CSV (embedded/local snapshot). */
        function supplementCsvOnlyPaletteColumns(liveText, authorityText) {
          if (!liveText || !authorityText) {
            return {
              text: liveText,
              filled: 0,
              gapsRemaining: countCsvOnlyPaletteGaps(liveText),
            };
          }
          var liveRecords = parseCsvRecords(liveText);
          var authRecords = parseCsvRecords(authorityText);
          if (liveRecords.length < 2 || authRecords.length < 2) {
            return {
              text: liveText,
              filled: 0,
              gapsRemaining: countCsvOnlyPaletteGaps(liveText),
            };
          }
          var layout = getCsvLayout(liveRecords[0].join(","));
          var authLayout = getCsvLayout(authRecords[0].join(","));
          var headerCols = parseCsvLine(liveRecords[0].join(","));
          var colIndices = [];
          var li;
          for (li = 0; li < CSV_ONLY_PALETTE_LABELS.length; li++) {
            var hi;
            for (hi = 0; hi < headerCols.length; hi++) {
              if ((headerCols[hi] || "").trim() === CSV_ONLY_PALETTE_LABELS[li]) {
                colIndices.push(hi);
                break;
              }
            }
          }
          if (!colIndices.length) {
            return {
              text: liveText,
              filled: 0,
              gapsRemaining: countCsvOnlyPaletteGaps(liveText),
            };
          }
          var authBySlot = {};
          var ri;
          for (ri = 1; ri < authRecords.length; ri++) {
            var authCols = authRecords[ri];
            var slot = (authCols[authLayout.slot] || "").trim();
            if (slot) authBySlot[slot] = authCols;
          }
          var filled = 0;
          for (ri = 1; ri < liveRecords.length; ri++) {
            var cols = liveRecords[ri];
            slot = (cols[layout.slot] || "").trim();
            if (!slot || !authBySlot[slot]) continue;
            var ci;
            for (ci = 0; ci < colIndices.length; ci++) {
              var colIdx = colIndices[ci];
              if (isEmptyPaletteCell(cols[colIdx])) {
                var authVal = (authBySlot[slot][colIdx] || "").trim();
                if (authVal && normalizeHex(authVal)) {
                  cols[colIdx] = authVal;
                  filled++;
                }
              }
            }
          }
          if (!filled) {
            return {
              text: liveText,
              filled: 0,
              gapsRemaining: countCsvOnlyPaletteGaps(liveText),
            };
          }
          var lines = [];
          for (ri = 0; ri < liveRecords.length; ri++) {
            lines.push(liveRecords[ri].map(escapeCsvField).join(","));
          }
          return {
            text: lines.join("\n"),
            filled: filled,
            gapsRemaining: countCsvOnlyPaletteGaps(lines.join("\n")),
          };
        }

        function buildLiveSourceLabel(source, supplementMeta) {
          supplementMeta = supplementMeta || {};
          var interval = Math.round(previewLiveSyncMs / 1000);
          if (source === "csv" || source === "proxy" || source === "proxy-jsonp") {
            return (
              "נטען מ-Google Sheet (CSV מלא · עדכון חי כל " + interval + " שניות)"
            );
          }
          var label =
            "נטען מ-Google Sheet (gviz · עדכון חי כל " + interval + " שניות)";
          if (supplementMeta.filled) {
            label += " · Palette 8–12: " + supplementMeta.filled + " תאים מ-snapshot";
          }
          if (supplementMeta.gapsRemaining) {
            label +=
              " · הרץ npm run serve לעדכון מלא של Palette 8–12";
          }
          return label;
        }

        var lastSheetCsvFingerprint = null;

        function isValidPaletteCsvHeader(text) {
          if (!text || text.indexOf("Category,") === -1) return false;
          return (
            text.indexOf(",Slot,") !== -1 ||
            text.indexOf(",Division,Slot,") !== -1
          );
        }

        function getEmbeddedPaletteCsvText() {
          if (
            window.EMBEDDED_PALETTE_CSV_TEXT &&
            typeof window.EMBEDDED_PALETTE_CSV_TEXT === "string" &&
            window.EMBEDDED_PALETTE_CSV_TEXT.length
          ) {
            return window.EMBEDDED_PALETTE_CSV_TEXT;
          }
          return null;
        }

        function applySheetCsvText(text, sourceLabel, options) {
          options = options || {};
          if (text === lastSheetCsvFingerprint) return false;
          lastSheetCsvFingerprint = text;
          renderTable(parseRows(text));
          if (!options.silent) {
            setStatus(sourceLabel);
          }
          return true;
        }

        function load(options) {
          options = options || {};
          if (!options.silent) {
            setStatus("טוען…");
            tbody.textContent = "";
          }
          fetchLiveSheetCsvText()
            .then(function (result) {
              var text = result.text;
              var source = result.source;
              var supplementMeta = { filled: 0, gapsRemaining: 0 };
              if (source === "gviz") {
                var authority = getEmbeddedPaletteCsvText();
                var supplemented = supplementCsvOnlyPaletteColumns(text, authority);
                text = supplemented.text;
                supplementMeta = supplemented;
              }
              if (!isValidPaletteCsvHeader(text)) {
                throw new Error("Invalid sheet CSV");
              }
              applySheetCsvText(
                text,
                buildLiveSourceLabel(source, supplementMeta),
                options
              );
            })
            .catch(function () {
              return fetchText(LOCAL_CSV_URL).then(function (text) {
                if (!isValidPaletteCsvHeader(text)) {
                  throw new Error("Invalid local CSV");
                }
                applySheetCsvText(
                  text,
                  "נטען מקובץ מקומי: data/sheet-palette-colors.csv",
                  options
                );
              });
            })
            .catch(function () {
              var embedded = getEmbeddedPaletteCsvText();
              if (embedded && isValidPaletteCsvHeader(embedded)) {
                var fileHint =
                  location.protocol === "file:"
                    ? " · פתח דרך npm run serve לעדכון חי"
                    : "";
                applySheetCsvText(
                  embedded,
                  "נטען מ-snapshot מוטמע (offline)" + fileHint,
                  options
                );
                return;
              }
              throw new Error("No palette data available");
            })
            .catch(function (err) {
              if (!options.silent) {
                setStatus(
                  "שגיאה בטעינה: " + (err && err.message ? err.message : err),
                  true
                );
              }
            });
        }

        reloadBtn.addEventListener("click", function () {
          load();
        });
        var previewWasHidden = false;
        var previewLiveSyncMs = 3000;
        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "hidden") {
            previewWasHidden = true;
            return;
          }
          if (previewWasHidden) {
            previewWasHidden = false;
            setTimeout(load, 200);
          }
        });
        window.addEventListener("pageshow", function (ev) {
          if (ev.persisted) load();
        });
        setInterval(function () {
          if (document.hidden) return;
          load({ silent: true });
        }, previewLiveSyncMs);
        load();
      })();
    </script>
  </body>
</html>
