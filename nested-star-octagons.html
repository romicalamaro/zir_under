<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Grid — 70×180cm @ 300 DPI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell app-shell--standalone">
      <aside class="sidebar" aria-label="Design controls">
        <div class="sidebar__scroll">
          <section class="sidebar__section sidebar__section--identity">
            <h2 class="sidebar__title">Profile</h2>
            <div class="sidebar__identity-fields">
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Have I lived in Iran?</span>
                <div class="sidebar__identity-slot" id="identity-living-slot">
                  <div
                    class="sidebar__toggle sidebar__identity-living-toggle"
                    role="group"
                    aria-label="Have I lived in Iran? Yes or no"
                  >
                    <button
                      type="button"
                      id="living-in-btn"
                      class="sidebar__toggle-btn is-active"
                      aria-pressed="true"
                    >
                      Yes
                    </button>
                    <button
                      type="button"
                      id="living-outside-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      No
                    </button>
                  </div>
                </div>
              </div>
              <div
                class="sidebar__identity-field"
                id="identity-leaving-year-field"
              >
                <span class="sidebar__identity-heading">Year of leaving</span>
                <div class="sidebar__identity-slot" id="identity-leaving-year-slot">
                  <input
                    id="identity-leaving-year-input"
                    class="sidebar__identity-input"
                    type="text"
                    value="2021"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="4"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Year of leaving"
                    placeholder="Year you left Iran"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">From</span>
                <div class="sidebar__identity-slot" id="identity-from-slot">
                  <input
                    id="identity-from-input"
                    class="sidebar__identity-input sidebar__identity-input--english"
                    type="text"
                    lang="en"
                    value="TEHERAN"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="From"
                    placeholder="Where you are originally from"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Now in</span>
                <div class="sidebar__identity-slot" id="identity-now-in-slot">
                  <input
                    id="identity-now-in-input"
                    class="sidebar__identity-input sidebar__identity-input--english"
                    type="text"
                    lang="en"
                    value="MAINZ"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Now in"
                    placeholder="Where you live now"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Name</span>
                <div class="sidebar__identity-slot" id="identity-name-slot">
                  <input
                    id="identity-name-input"
                    class="sidebar__identity-input sidebar__identity-input--english"
                    type="text"
                    lang="en"
                    autocomplete="off"
                    spellcheck="false"
                    aria-label="Name"
                    placeholder="Full name"
                  />
                  <div
                    class="sidebar__toggle sidebar__identity-name-mode-toggle"
                    role="group"
                    aria-label="How name appears on the label"
                  >
                    <button
                      type="button"
                      id="identity-name-anonymous-btn"
                      class="sidebar__toggle-btn is-active"
                      aria-pressed="true"
                    >
                      Anonymous
                    </button>
                    <button
                      type="button"
                      id="identity-name-initials-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      Initials
                    </button>
                    <button
                      type="button"
                      id="identity-name-none-btn"
                      class="sidebar__toggle-btn"
                      aria-pressed="false"
                    >
                      No name
                    </button>
                  </div>
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span class="sidebar__identity-heading">Age</span>
                <div class="sidebar__identity-slot" id="identity-age-slot">
                  <input
                    id="identity-age-input"
                    class="sidebar__identity-input"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="2"
                    autocomplete="off"
                    aria-label="Age"
                    value="27"
                  />
                </div>
              </div>
              <div class="sidebar__identity-field">
                <span
                  class="sidebar__identity-heading sidebar__identity-heading--wrap"
                  >where do you feel most &quot;at home&quot; today?</span
                >
                <div class="sidebar__identity-slot" id="identity-home-at-slot">
                  <div
                    class="sidebar__toggle sidebar__identity-home-toggle"
                    role="radiogroup"
                    aria-label='where do you feel most "at home" today?'
                  >
                    <button
                      type="button"
                      id="identity-home-at-in-iran-btn"
                      class="sidebar__toggle-btn is-active"
                      data-home-at="inIran"
                      aria-pressed="true"
                    >
                      In Iran
                    </button>
                    <button
                      type="button"
                      id="identity-home-at-where-i-live-btn"
                      class="sidebar__toggle-btn"
                      data-home-at="whereILive"
                      aria-pressed="false"
                    >
                      Outside Iran / where I live now
                    </button>
                    <button
                      type="button"
                      id="identity-home-at-nowhere-btn"
                      class="sidebar__toggle-btn"
                      data-home-at="nowhere"
                      aria-pressed="false"
                    >
                      Nowhere / in between
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="sidebar__section sidebar__section--grid-choose">
            <h2 class="sidebar__title">Grid</h2>
            <div
              class="sidebar__grid-choose-btns"
              role="group"
              aria-label="Grid type"
            >
              <a href="index.html" id="grid-choose-octagon-btn" class="sidebar__grid-btn"
                >Octagon</a
              >
              <a
                href="nested-star-octagons.html"
                id="grid-choose-star-btn"
                class="sidebar__grid-btn is-active"
                aria-current="page"
                >Star grid</a
              >
            </div>
          </section>

          <section class="sidebar__section sidebar__section--colors-export">
            <h2 class="sidebar__title">Grid &amp; export</h2>
            <ol
              class="sidebar__numbered sidebar__controls--compact"
              aria-label="Grid and export"
            >
            <li class="sidebar__item">
              <span class="sidebar__item-label">Complete octagons per row</span>
              <div class="sidebar__item-control">
                <input
                  id="nested-star-octagons-n"
                  type="range"
                  min="3"
                  max="15"
                  value="7"
                  step="1"
                  aria-label="Number of complete octagons per row"
                />
                <output id="nested-star-octagons-n-out" for="nested-star-octagons-n"
                  >7</output
                >
              </div>
            </li>
            <li class="sidebar__item sidebar__item--action">
              <span class="sidebar__item-label">Export SVG</span>
              <div class="sidebar__item-control">
                <button type="button" id="export-svg-btn">Export SVG</button>
              </div>
            </li>
          </ol>
          </section>

          <p class="sidebar__hint" id="tile-info" aria-live="polite"></p>
        </div>
      </aside>
      <div class="main">
        <div class="stage-wrap" id="stage-wrap">
          <!-- SVG injected by js/nestedStarOctagonsApp.js -->
        </div>
      </div>
    </div>
    <script defer src="js/constants.js"></script>
    <script defer src="js/nestedStarOctagonsGeometry.js"></script>
    <script defer src="js/identityControls.js"></script>
    <script defer src="js/nestedStarOctagonsApp.js"></script>
  </body>
</html>
