<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topkapi Grid — 70×180cm @ 300 DPI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Background controls">
        <h2 class="sidebar__title">Background</h2>
        <button
          type="button"
          id="bg-white-toggle-btn"
          class="sidebar__btn"
          aria-pressed="false"
        >
          White background
        </button>
        <div id="bg-gradient-controls">
          <div class="sidebar__field">
            <span class="sidebar__label">Direction</span>
            <div
              class="sidebar__toggle"
              role="group"
              aria-label="Background section direction"
            >
              <button
                type="button"
                id="bg-direction-vertical-btn"
                class="sidebar__toggle-btn is-active"
                aria-pressed="true"
              >
                Vertical
              </button>
              <button
                type="button"
                id="bg-direction-horizontal-btn"
                class="sidebar__toggle-btn"
                aria-pressed="false"
              >
                Horizontal
              </button>
            </div>
          </div>
          <label class="sidebar__field sidebar__field--color">
            Color 1
            <input id="bg-color-1" type="color" value="#e8d96a" />
          </label>
          <label class="sidebar__field sidebar__field--color">
            Color 2
            <input id="bg-color-2" type="color" value="#8b6057" />
          </label>
          <label class="sidebar__field sidebar__field--color">
            Color 3
            <input id="bg-color-3" type="color" value="#d4d0d0" />
          </label>
        </div>
      </aside>
      <div class="main">
        <header class="toolbar">
          <label>
            Octagons per row (n)
            <input
              id="octagons-n"
              type="range"
              min="3"
              max="15"
              value="7"
              step="1"
            />
            <output id="octagons-n-out" for="octagons-n">7</output>
          </label>
          <label>
            Inner scale
            <input
              id="inner-scale"
              type="range"
              min="0.3"
              max="1"
              value="1"
              step="0.01"
            />
            <output id="inner-scale-out" for="inner-scale">1</output>
          </label>
          <label class="toolbar__field--color">
            Pattern color
            <input
              id="pattern-stroke-color"
              type="color"
              value="#685450"
              title="Grid and circles"
            />
          </label>
          <label>
            Grid line weight
            <input
              id="grid-stroke-width"
              type="range"
              min="1"
              max="5"
              value="1"
              step="1"
            />
            <output id="grid-stroke-width-out" for="grid-stroke-width"
              >1 px</output
            >
          </label>
          <label>
            Circle density
            <input
              id="circle-density"
              type="range"
              min="10"
              max="40"
              value="25"
              step="1"
            />
            <output id="circle-density-out" for="circle-density">25%</output>
          </label>
          <button type="button" id="randomize-circles-btn">
            Randomize circles
          </button>
          <p class="toolbar__hint" id="tile-info" aria-live="polite"></p>
          <p class="toolbar__hint toolbar__hint--mode" id="merge-hint" hidden>
            Drag across lines to merge
          </p>
          <p
            class="toolbar__hint toolbar__hint--mode"
            id="restore-hint"
            hidden
          >
            Drag along gaps or next to lines to restore (no loose ends)
          </p>
          <div class="toolbar__mode" role="group" aria-label="Interaction mode">
            <button
              type="button"
              id="mode-view-btn"
              class="toolbar__mode-btn is-active"
              aria-pressed="true"
            >
              View
            </button>
            <button
              type="button"
              id="mode-merge-btn"
              class="toolbar__mode-btn"
              aria-pressed="false"
            >
              Merge
            </button>
            <button
              type="button"
              id="mode-restore-btn"
              class="toolbar__mode-btn"
              aria-pressed="false"
            >
              Restore
            </button>
          </div>
          <div class="toolbar__actions">
            <button type="button" id="reset-grid-btn" disabled>
              Reset grid
            </button>
            <button type="button" id="export-svg-btn">Export SVG</button>
          </div>
        </header>
        <div class="stage-wrap" id="stage-wrap">
          <!-- SVG injected by js/app.js -->
        </div>
      </div>
    </div>
    <script defer src="js/constants.js"></script>
    <script defer src="js/topkapiGeometry.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
